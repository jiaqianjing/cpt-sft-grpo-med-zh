# LLaMA-Factory template for CPT (stage=pt). The Python wrapper (train/run_cpt.py) overlays
# run-specific values (paths, lr, epochs, batch, run_name) from configs/schema.py before launch.
### model
model_name_or_path: Qwen/Qwen3-4B-Base
trust_remote_code: false

### method
stage: pt
do_train: true
finetuning_type: full
deepspeed: configs/ds_z3.json

### dataset  (registered by train/lf_common.py -> data/llamafactory/dataset_info.json)
dataset: cpt_zh_medical
dataset_dir: data/llamafactory
cutoff_len: 4096
packing: true
preprocessing_num_workers: 32
overwrite_cache: true

### output
output_dir: checkpoints/cpt
logging_steps: 10
save_steps: 500
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
report_to: wandb
run_name: cpt

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.1
bf16: true
flash_attn: fa2
ddp_timeout: 180000000
